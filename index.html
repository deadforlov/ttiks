<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive VIP Access</title>
    <style>
        /* Сброс стандартных отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Подключение твоего стильного фона */
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Центрируем контент по вертикали, если есть место */
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Затемняющий слой поверх фона для идеальной читаемости */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Чуть затемнили для сочности неонового свечения */
            z-index: -1;
        }

        /* Главный заголовок сайта */
        h1 {
            text-align: center;
            font-size: 2.4rem;
            margin-bottom: 45px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            font-weight: 800;
        }

        /* Контейнер для карточек. На ПК — в ряд, на смартфонах — тоже в один компактный ряд */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        /* Стильная карточка с эффектом матового стекла (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Эффект при наведении мышки (на ПК) */
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 0, 127, 0.5);
        }

        /* Аватарка девушки с неоновым OnlyFans-голубым свечением */
        .profile-img {
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid #00aff0; 
            box-shadow: 0 0 20px rgba(0, 175, 240, 0.6);
            margin-bottom: 25px;
            display: block; 
        }

        /* Имя модели */
        .name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* Английский байт-текст */
        .bait-text {
            font-size: 0.95rem;
            color: #e0e0e0;
            margin-bottom: 30px;
            line-height: 1.6;
            min-height: 72px; /* Удерживает кнопки на одном уровне на ПК */
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* Ссылки-кнопки */
        .cta-button {
            display: block;
            text-decoration: none;
            color: white;
            background: linear-gradient(90deg, #ff007f, #00aff0); 
            padding: 16px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2.2s infinite; 
            width: 100%; 
        }

        .cta-button:hover {
            background: linear-gradient(90deg, #00aff0, #ff007f);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.9);
            transform: scale(1.04);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255, 0, 127, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0); }
        }

        /* УЛЬТРА-АДАПТИВНОСТЬ ДЛЯ МОБИЛЬНЫХ ТЕЛЕФОНОВ (Экран до 480px)
          Выстраиваем всех 3 девушек в один горизонтальный ряд на одном экране
        */
        @media (max-width: 480px) {
            body {
                padding: 15px 8px;
                justify-content: center; /* Строго по центру экрана мобильного */
            }
            h1 {
                font-size: 1.35rem;
                margin-bottom: 20px;
                letter-spacing: 1px;
            }
            .cards-container {
                flex-wrap: nowrap; /* ЗАПРЕЩАЕМ перенос на новую строку */
                gap: 6px; /* Минимальный зазор, чтобы всё влезло */
                align-items: stretch; /* Делаем все карточки строго одной высоты */
            }
            .card {
                padding: 12px 6px;
                border-radius: 16px;
                max-width: 33.33%; /* Каждая карточка занимает ровно треть ширины */
                justify-content: space-between; /* Прижимает кнопку к самому низу карточки */
            }
            .profile-img {
                width: 68px; /* Уменьшаем круглые фото для мобильного */
                height: 68px;
                border-width: 2px;
                margin-bottom: 10px;
                box-shadow: 0 0 10px rgba(0, 175, 240, 0.5);
            }
            .name {
                font-size: 0.8rem; /* Компактный шрифт для имен */
                margin-bottom: 6px;
                line-height: 1.1;
                word-wrap: break-word;
            }
            .bait-text {
                font-size: 0.65rem; /* Микро-текст байта, чтобы не занимал место */
                margin-bottom: 12px;
                line-height: 1.2;
                min-height: auto; /* Сбрасываем ПК настройки */
                flex-grow: 1; /* Растягивает блок, выравнивая кнопки */
            }
            .cta-button {
                padding: 10px 2px;
                font-size: 0.6rem; /* Компактный и агрессивный текст на кнопке */
                letter-spacing: 0px;
                border-radius: 20px;
                white-space: normal; /* Разрешаем тексту на кнопке переноситься на 2 строки */
                line-height: 1.1;
            }
        }
    </style>
</head>
